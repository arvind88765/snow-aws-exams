<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mock Exam Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' }
</script>
<style>
  .love-particle{position:fixed;font-size:22px;pointer-events:none;animation:floatUp 6s linear infinite;opacity:.85;z-index:50}
  @keyframes floatUp{0%{transform:translateY(0) scale(.8);opacity:0}20%{opacity:1}100%{transform:translateY(-120vh) scale(1.4);opacity:0}}
  .option-card{transition:all .25s ease}
  .option-card:hover{transform:translateY(-2px)}
</style>
</head>
<body id="appBody" class="bg-gradient-to-br from-slate-100 via-slate-200 to-slate-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 min-h-screen text-slate-900 dark:text-white transition-all duration-500">

<div class="max-w-6xl mx-auto p-4 md:p-6">

  <div class="flex justify-between items-center mb-6">
    <h1 id="appTitle" class="text-2xl md:text-4xl font-bold">⚡ Mock Exam Portal</h1>
    <div class="flex gap-3">
      <button onclick="toggleTheme()" class="px-4 py-2 rounded-2xl bg-white dark:bg-slate-800 shadow-lg">🌙 / ☀️</button>
      <button onclick="toggleLoveMode()" id="loveBtn" class="px-4 py-2 rounded-2xl bg-pink-500 text-white shadow-lg">💖 Love</button>
    </div>
  </div>

  <!-- Home -->
  <div id="home" class="space-y-5">
    <div class="grid md:grid-cols-3 gap-5">
      <button onclick="selectExam('servicenow')" class="p-6 rounded-3xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-xl hover:scale-[1.02] transition">
        <h2 class="text-2xl font-bold">ServiceNow CIS-CSM</h2>
        <p class="mt-2 text-sm opacity-80">Customer Service Management</p>
      </button>
      <button onclick="selectExam('aws')" class="p-6 rounded-3xl bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-xl hover:scale-[1.02] transition">
        <h2 class="text-2xl font-bold">AWS DEA-C01</h2>
        <p class="mt-2 text-sm opacity-80">Data Engineer Associate</p>
      </button>
      <button onclick="selectExam('clf')" class="p-6 rounded-3xl bg-gradient-to-r from-yellow-400 to-orange-400 text-white shadow-xl hover:scale-[1.02] transition">
        <h2 class="text-2xl font-bold">AWS CLF-C02</h2>
        <p class="mt-2 text-sm opacity-80">Cloud Practitioner</p>
      </button>
    </div>
  </div>

  <!-- Setup -->
  <div id="setup" class="hidden bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-6 mt-6">
    <div class="flex justify-between items-center">
      <h2 id="examTitle" class="text-2xl md:text-3xl font-bold"></h2>
      <button onclick="goHome()" class="px-5 py-3 rounded-2xl bg-slate-900 text-white">🏠 Home</button>
    </div>
    <div class="mt-6 flex flex-col md:flex-row gap-4">
      <input id="questionCount" type="number" min="1" placeholder="Enter question count" class="border rounded-2xl px-4 py-4 text-lg w-full md:w-72 text-black" />
      <button onclick="startExam()" class="bg-green-600 text-white px-6 py-4 rounded-2xl font-semibold">🚀 Start Exam</button>
    </div>
  </div>

  <!-- Exam -->
  <div id="exam" class="hidden mt-6">
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-4 md:p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 id="runningExamTitle" class="text-xl md:text-2xl font-bold"></h2>
        <div id="progress" class="font-bold"></div>
      </div>

      <h3 id="question" class="text-lg md:text-2xl font-semibold leading-relaxed mb-8"></h3>
      <div id="options" class="space-y-4"></div>

      <div class="flex flex-wrap gap-3 mt-8">
        <button onclick="prevQuestion()" class="px-5 py-3 rounded-2xl border">⬅ Previous</button>
        <button onclick="nextQuestion()" class="px-5 py-3 rounded-2xl bg-slate-900 text-white">Next ➜</button>
        <button onclick="submitExam()" class="px-5 py-3 rounded-2xl bg-green-600 text-white">✅ Submit</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="hidden mt-6"></div>
</div>

<script>
let allQuestions=[];
let questions=[];
let currentIndex=0;
let userAnswers=[];
let selectedExam="";
let loveMode=false;
let loveInterval=null;

const exams={
  servicenow:{title:"ServiceNow CIS-CSM",file:"exams/servicenow.json"},
  aws:{title:"AWS DEA-C01",file:"exams/aws.json"},
  clf:{title:"AWS CLF-C02",file:"exams/clf.json"}
};

function toggleTheme(){
  document.documentElement.classList.toggle('dark');
}

function createHeart(){
  const heart=document.createElement('div');
  const icons=['💖','💕','💘','🌸','💞','❤️'];
  heart.className='love-particle';
  heart.innerText=icons[Math.floor(Math.random()*icons.length)];
  heart.style.left=Math.random()*100+'vw';
  heart.style.bottom='-40px';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),7000);
}

function toggleLoveMode(){
  loveMode=!loveMode;
  const body=document.getElementById('appBody');
  const title=document.getElementById('appTitle');

  if(loveMode){
    body.classList.add('from-pink-200','via-rose-200','to-red-200');
    title.innerText='💖 Love Mode Mock Exam Portal';
    document.getElementById('loveBtn').innerText='💔 Off';
    loveInterval=setInterval(createHeart,500);
  } else {
    body.classList.remove('from-pink-200','via-rose-200','to-red-200');
    title.innerText='⚡ Mock Exam Portal';
    document.getElementById('loveBtn').innerText='💖 Love';
    clearInterval(loveInterval);
    document.querySelectorAll('.love-particle').forEach(el=>el.remove());
  }
}

async function selectExam(examKey){
  selectedExam=examKey;
  try{
    const res=await fetch(exams[examKey].file);
    const raw=await res.json();
    allQuestions=raw.questions||raw; // handles both wrapped and flat array
    document.getElementById('home').classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
    document.getElementById('examTitle').innerText=`${exams[examKey].title} (${allQuestions.length} Questions)`;
  }catch(err){
    alert('Failed to load exam JSON. Check exams folder.');
  }
}

function goHome(){
  document.getElementById('result').classList.add('hidden');
  document.getElementById('exam').classList.add('hidden');
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
}

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

function startExam(){
  const count=parseInt(document.getElementById('questionCount').value);
  if(!count || count<1 || count>allQuestions.length){
    alert(`Enter a valid count between 1 and ${allQuestions.length}`);
    return;
  }

  questions=shuffle(allQuestions).slice(0,count).map(q=>({...q}));
  userAnswers=[];
  currentIndex=0;

  document.getElementById('setup').classList.add('hidden');
  document.getElementById('exam').classList.remove('hidden');
  document.getElementById('runningExamTitle').innerText=exams[selectedExam].title;

  renderQuestion();
}

function renderQuestion(){
  const q=questions[currentIndex];
  document.getElementById('progress').innerText=`${currentIndex+1}/${questions.length}`;
  document.getElementById('question').innerText=q.question_text;

  const optionsDiv=document.getElementById('options');
  optionsDiv.innerHTML='';

  Object.entries(q.choices).forEach(([key,val])=>{
    const checked=(userAnswers[currentIndex]||'').includes(key);
    optionsDiv.innerHTML += `
      <label class="option-card flex items-start gap-4 border rounded-2xl p-4 bg-white dark:bg-slate-700 shadow-sm cursor-pointer">
        <input class="mt-1" type="${q.answer.length>1?'checkbox':'radio'}" name="option" value="${key}" ${checked?'checked':''}>
        <div>
          <div class="font-bold text-lg">${key}</div>
          <div>${val}</div>
        </div>
      </label>`;
  });
}

function saveCurrentAnswer(){
  userAnswers[currentIndex]=[...document.querySelectorAll('input[name="option"]:checked')]
    .map(x=>x.value).sort().join('');
}

function nextQuestion(){
  saveCurrentAnswer();
  if(currentIndex<questions.length-1){ currentIndex++; renderQuestion(); }
}

function prevQuestion(){
  saveCurrentAnswer();
  if(currentIndex>0){ currentIndex--; renderQuestion(); }
}

function toggleOptions(index){
  document.getElementById(`options-review-${index}`).classList.toggle('hidden');
}

function showReviewSection(type){
  document.getElementById('wrong-section').classList.toggle('hidden', type!=='wrong');
  document.getElementById('correct-section').classList.toggle('hidden', type!=='correct');
}

function submitExam(){
  saveCurrentAnswer();
  let score=0, correctHTML='', wrongHTML='';

  questions.forEach((q,index)=>{
    const correct=q.answer.split('').sort().join('');
    const user=(userAnswers[index]||'').split('').sort().join('');

    let optionsHtml='';
    Object.entries(q.choices).forEach(([key,val])=>{
      const isCorrect=correct.includes(key);
      const isUser=user.includes(key);
      optionsHtml += `<div class="p-3 rounded-xl mb-2 ${isCorrect?'bg-green-100':'bg-slate-100'} ${isUser&&!isCorrect?'border-2 border-red-500':''}"><strong>${key}</strong> - ${val}</div>`;
    });

    const block=`
      <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-xl p-6 mb-6">
        <h3 class="font-bold text-xl mb-4">Q${index+1}</h3>
        <p class="mb-5">${q.question_text}</p>
        <button onclick="toggleOptions(${index})" class="mb-4 px-4 py-2 rounded-xl bg-pink-500 text-white">👀 View Options</button>
        <div id="options-review-${index}" class="hidden">${optionsHtml}</div>
        <p><strong>Your Answer:</strong> ${user || 'Not Answered'}</p>
        <p><strong>Correct Answer:</strong> ${correct}</p>
      </div>`;

    if(correct===user){ score++; correctHTML+=block; }
    else { wrongHTML+=block; }
  });

  const percentage=((score/questions.length)*100).toFixed(2);

  document.getElementById('exam').classList.add('hidden');
  const result=document.getElementById('result');
  result.classList.remove('hidden');

  result.innerHTML=`
    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl p-8">
      <h2 class="text-3xl font-bold">🎯 Exam Completed</h2>
      <div class="grid md:grid-cols-2 gap-4 mt-6">
        <div class="p-4 bg-green-100 rounded-xl">Correct: ${score}</div>
        <div class="p-4 bg-red-100 rounded-xl">Wrong: ${questions.length-score}</div>
        <div class="p-4 bg-blue-100 rounded-xl">Percentage: ${percentage}%</div>
      </div>
      <div class="flex gap-4 mt-6">
        <button onclick="retryWrongQuestions()" class="bg-red-600 text-white px-4 py-3 rounded-2xl">Retry Wrong</button>
        <button onclick="goHome()" class="bg-slate-900 text-white px-4 py-3 rounded-2xl">🏠 Home</button>
      </div>
    </div>

    <div class="mt-8">
      <div class="flex gap-4 mb-6">
        <button onclick="showReviewSection('wrong')" class="px-5 py-3 rounded-2xl bg-red-600 text-white">❌ Wrong Answers</button>
        <button onclick="showReviewSection('correct')" class="px-5 py-3 rounded-2xl bg-green-600 text-white">✅ Correct Answers</button>
      </div>

      <div id="wrong-section">${wrongHTML || '<div>No wrong answers 🎉</div>'}</div>
      <div id="correct-section" class="hidden">${correctHTML || '<div>No correct answers</div>'}</div>
    </div>`;
}

function retryWrongQuestions(){
  const wrong=[];
  questions.forEach((q,index)=>{
    const correct=q.answer.split('').sort().join('');
    const user=(userAnswers[index]||'').split('').sort().join('');
    if(correct!==user) wrong.push(q);
  });

  questions=wrong;
  userAnswers=[];
  currentIndex=0;

  document.getElementById('result').classList.add('hidden');
  document.getElementById('exam').classList.remove('hidden');
  renderQuestion();
}
</script>

</body>
</html>
